<!--Hypertext Markup Language-->
<!DOCTYPE html> <!--Tells the computer what type of text is
written on the document-->
<html lang="en"><!--Everything happening between these tags is
HTML-->
    <head><!--Info for the browser that the user doesnt't see-->
        <title>HTML Basics Notes</title>
        <meta charset="UTF-8"> <!--Meta can give a lot of
        differnt info, this time we are saying we are using the
        english alphabet-->
    </head>
    <body> <!--Content that the user will see-->
        <h1>This is the <u>title</u> of my
         webpage</h1>
         <h6>Smallest header</h6>
        <p>This is where you write the contents
         of your web pages. <br>Think of these just
        like paragraphs on your English papers in
        class!</p>
        <br>
        <br>
        <p>This is a second paragraph that has 
         more information.</p>
    </body>

</html>
