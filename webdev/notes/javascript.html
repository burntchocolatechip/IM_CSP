<!DOCTYPE html>
<html lang="eng">
    <head>
        <title>JavaScript Notes</title>
        <meta charset="UTF-8">
        <style>
            #timp{
                display: none;
                width: 50%;
            }
        </style>
        <script>
            let count = 0
            let imgs = ["https://www.earthdiver.com/cdn-cgi/image/width=4000,quality=75,format=auto/https://assets.earthdiver.com/media/media-2727684.jp?w=5246&h=2193&tick=1667491652923","https://upload.wikimedia.org/wikipedia/commons/1/12/Mount_Timpanogos_-_01-07-08.jpg","https://ctfassets.ksldigital.com/0wjmk6wgfops/5JD8w0POZhQ3qrd67umb3x/20641b214beec98ee856a8b51b278947/1d4f485432_d05d7611-2084-4c25-ac90-807915184a65.jpg?q=70"]
            let img_count = 0
            function change(){
                if (img_count >= imgs.length){
                    img_count = 0
                }else{
                    img_count += 1
                }
                document.getElementById('timp').src = imgs[img_count]
            }
            function update(){
                document.getElementById('title').style.color = document.getElementById("color-choice").value
            }
            function add(){
                count += 1
                document.getElementById("number").innerHTML = count
            }
            function hover(id){
                document.getElementById(id).style.backgroundColor = "pink"
                document.getElementById(id).style.color = "red"
            }
            function unhover(id){
                document.getElementById(id).style.backgroundColor = "lightgrey"
                document.getElementById(id).style.color = "black"
            }
            function show(){
                if(document.getElementById("timp").style.display == "block"){
                    document.getElementById("timp").style.display = "none"
                }else{
                document.getElementById("timp").style.display = "block"
                }
            }
            //onclick onmousover onmouseout onmousedown onmouseup
        </script>
    </head>
    <body>
        <h1 id="title" onmouseover="alert('This is about JavaScript')">JavaScript Notes</h1>
        <input type="color" id="color-choice">
        <button onclick="update()" id="one" onmouseover="hover('one')" onmouseout="unhover('one')">Click Me!</button>
        <p id="number" onmouseover="show()">0</p>
        <button onclick="add()" id="two" onmouseover="hover('two')" onmouseout="unhover('two')">Add</button>
        <br>
          <img src="https://www.earthdiver.com/cdn-cgi/image/width=4000,quality=75,format=auto/https://assets.earthdiver.com/media/media-2727685.jp?w=1144&h=287&tick=1667491678182" alt="Mt Timp at daytime" id="timp" onmouseover="change()"/>
    </body>
</html>
