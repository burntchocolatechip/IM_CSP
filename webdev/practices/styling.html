<!DOCTYPE html>
<html lang="eng">
    <head>
    <title>Styling with color</title>
    <meta charset="UTF-8">
    <style>
        #complementary{
            height: 50px;
            width: 100px;
            border: 3px solid blue;
            background-color: orange;
            color: white;
        }
        #analogous{
            height: 50px;
            width: 100px;
            border: 3px solid green;
            background-color: greenyellow;
            color: yellow;
        }
        #triadic{
            height: 50px;
            width: 100px;
            border: 3px solid red;
            background-color: blue;
            color: yellow;
        }
    </style>
   </head>
   <body>
        <div id="complementary">
            <p>Complementary</p>
        </div>
        <div id="analogous">
            <p>Analogous</p>
        </div>
        <div id="triadic">
            <p>Triadic</p>
        </div>
   </body>
</html>
